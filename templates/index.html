<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINTEGRA Auto-Fix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #e0e0e0; min-height: 100vh; }
        header { background: #1a1a2e; border-bottom: 1px solid #2a2a3e; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 18px; }
        header span.accent { color: #e94560; }
        header a { color: #666; font-size: 12px; text-decoration: none; }
        main { max-width: 700px; margin: 40px auto; padding: 0 20px; }
        .card { background: #16213e; border: 1px solid #2a2a4e; border-radius: 12px; padding: 32px; margin-bottom: 24px; }
        .card h2 { font-size: 18px; margin-bottom: 8px; }
        .card p.desc { color: #888; font-size: 13px; margin-bottom: 20px; }

        /* Upload zone */
        .upload-zone {
            border: 2px dashed rgba(233, 69, 96, 0.3); border-radius: 10px;
            padding: 40px; text-align: center; cursor: pointer; display: block;
            transition: border-color 0.2s, background 0.2s;
        }
        .upload-zone:hover { border-color: #e94560; background: rgba(233,69,96,0.05); }
        .upload-zone .icon { font-size: 40px; margin-bottom: 12px; }
        .upload-zone .main-text { color: #ccc; font-size: 15px; margin-bottom: 4px; }
        .upload-zone .sub-text { color: #666; font-size: 12px; }

        /* Buttons */
        .btn-row { display: flex; gap: 12px; margin-top: 20px; }
        button {
            flex: 1; padding: 12px 20px; border-radius: 8px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        button:disabled { background: #2a2a3e !important; color: #555 !important; cursor: not-allowed; }
        .btn-validate { background: #e94560; color: #fff; }
        .btn-validate:hover:not(:disabled) { background: #d63850; }
        .btn-fix { background: #4f46e5; color: #fff; }
        .btn-fix:hover:not(:disabled) { background: #4338ca; }
        .btn-download { background: #16a34a; color: #fff; }
        .btn-download:hover { background: #15803d; }
        .btn-confirm { background: #0891b2; color: #fff; }
        .btn-confirm:hover { background: #0e7490; }

        /* Loading */
        .loading { text-align: center; padding: 32px; display: none; }
        .loading.active { display: block; }
        .spinner { width: 32px; height: 32px; border: 3px solid #333; border-top-color: #e94560; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Results */
        .result { display: none; }
        .result.active { display: block; }
        .result-success { background: rgba(22,163,74,0.1); border: 1px solid rgba(22,163,74,0.3); border-radius: 12px; padding: 32px; text-align: center; }
        .result-error { background: rgba(233,69,96,0.08); border: 1px solid rgba(233,69,96,0.3); border-radius: 12px; padding: 24px; }
        .result-error h3 { color: #e94560; margin-bottom: 4px; }
        .error-item { background: rgba(233,69,96,0.08); border: 1px solid rgba(233,69,96,0.15); border-radius: 8px; padding: 10px 14px; margin-bottom: 6px; display: flex; gap: 10px; align-items: flex-start; font-size: 13px; }
        .error-item .badge { font-family: monospace; font-size: 11px; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
        .badge-line { background: rgba(233,69,96,0.2); color: #f87171; }
        .badge-code { background: rgba(233,69,96,0.15); color: #fca5a5; }

        /* Hidden file input - offscreen, not display:none */
        #file-input { position: absolute; left: -9999px; top: -9999px; }

        /* Info bar */
        .info-bar { font-size: 12px; color: #666; margin-top: 16px; }
        .info-bar span { margin-right: 16px; }

        .fix-hint { background: rgba(79,70,229,0.1); border: 1px solid rgba(79,70,229,0.3); border-radius: 8px; padding: 12px 16px; margin-top: 16px; font-size: 13px; color: #a5b4fc; }
        .confirm-banner { background: rgba(8,145,178,0.1); border: 1px solid rgba(8,145,178,0.3); border-radius: 8px; padding: 12px 16px; margin-top: 12px; font-size: 13px; color: #67e8f9; }
    </style>
</head>
<body>

<header>
    <div>
        <h1>SINTEGRA <span class="accent">Auto-Fix</span></h1>
    </div>
    <div>
        <a href="https://github.com/guizaodamec/sintegra-validator" target="_blank">GitHub</a>
    </div>
</header>

<main>

<!-- Upload -->
<div class="card">
    <h2>📄 Enviar Arquivo SINTEGRA</h2>
    <p class="desc">Formatos aceitos: .TXT (126 caracteres por linha, encoding latin-1, CR+LF)</p>

    <label for="file-input" class="upload-zone" id="drop-zone">
        <div class="icon">📁</div>
        <div class="main-text">Clique aqui para selecionar o arquivo</div>
        <div class="sub-text" id="file-name">Nenhum arquivo selecionado</div>
    </label>

    <input type="file" id="file-input" accept=".TXT,.txt" onchange="onFilePicked(event)">

    <div class="btn-row">
        <button id="validate-btn" class="btn-validate" disabled onclick="doValidate()">🔍 Validar Arquivo</button>
        <button id="fix-btn" class="btn-fix" disabled onclick="doFix()">🤖 Corrigir com IA</button>
    </div>
</div>

<!-- Loading -->
<div class="loading" id="loading">
    <div class="spinner"></div>
    <p id="loading-text">Processando...</p>
</div>

<!-- Results -->
<div class="result" id="result"></div>

</main>

<script>
let currentFileName = null;
let validationData = null;

function onFilePicked(e) {
    const file = e.target.files[0];
    if (!file) return;

    currentFileName = file.name;
    document.getElementById('file-name').textContent = '📄 ' + file.name + ' (' + (file.size/1024).toFixed(1) + ' KB)';
    document.getElementById('file-name').style.color = '#e94560';
    document.getElementById('validate-btn').disabled = false;
    document.getElementById('result').classList.remove('active');
}

// Drag & drop
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor = '#e94560'; });
dz.addEventListener('dragleave', e => { e.preventDefault(); dz.style.borderColor = ''; });
dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.style.borderColor = '';
    const file = e.dataTransfer.files[0];
    if (file) {
        const input = document.getElementById('file-input');
        const dt = new DataTransfer();
        dt.items.add(file);
        input.files = dt.files;
        input.dispatchEvent(new Event('change'));
    }
});

async function doValidate() {
    const input = document.getElementById('file-input');
    const file = input.files[0];
    if (!file) return;

    showLoading('Validando arquivo...');

    const fd = new FormData();
    fd.append('file', file);

    try {
        const r = await fetch('/validate', { method: 'POST', body: fd });
        validationData = await r.json();

        if (validationData.error) { showResult('error', validationData.error); return; }

        if (validationData.valid) {
            showResult('success', validationData);
            document.getElementById('fix-btn').disabled = true;
        } else {
            showResult('errors', validationData);
            document.getElementById('fix-btn').disabled = false;
        }
    } catch (e) {
        showResult('error', 'Erro de conexão: ' + e.message);
    }
}

async function doFix() {
    if (!validationData || !validationData.errors?.length) return;

    // Show progress panel
    const resultEl = document.getElementById('result');
    resultEl.classList.add('active');
    resultEl.innerHTML = `<div class="card">
        <h2>🤖 Corrigindo com DeepSeek IA</h2>
        <div id="steps-container" style="max-height:400px;overflow-y:auto;background:#0d1525;border-radius:8px;padding:16px;margin:12px 0;font-family:monospace;font-size:12px;line-height:1.6">
            <div style="color:#666">⏳ Aguardando DeepSeek...</div>
        </div>
        <div id="fix-result-area"></div>
    </div>`;

    const stepsEl = document.getElementById('steps-container');
    const resultArea = document.getElementById('fix-result-area');

    try {
        const r = await fetch('/fix-stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                errors: validationData.errors,
                filename: currentFileName || 'arquivo.TXT',
                temp_path: validationData.temp_path,
            })
        });

        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    try {
                        const data = JSON.parse(line.slice(6));
                        const step = data.step;
                        const msg = data.msg;

                        if (step === 'start') {
                            stepsEl.innerHTML = `<div style="color:#a5b4fc">${msg}</div>`;
                        } else if (step === 'reading') {
                            stepsEl.innerHTML += `<div style="color:#a5b4fc">${msg}</div>`;
                        } else if (step === 'calling') {
                            stepsEl.innerHTML += `<div style="color:#fbbf24">${msg}</div>`;
                        } else if (step === 'thinking') {
                            stepsEl.innerHTML += `<div style="color:#94a3b8;margin-left:8px;border-left:2px solid #334155;padding-left:8px">▸ ${escHtml(msg)}</div>`;
                            stepsEl.scrollTop = stepsEl.scrollHeight;
                        } else if (step === 'revalidating') {
                            stepsEl.innerHTML += `<div style="color:#a5b4fc;margin-top:8px">${msg}</div>`;
                        } else if (step === 'done') {
                            if (data.success) {
                                const dl = data.download || '';
                                const reval = data.re_valid ? '✅ Limpo!' : (data.remaining_errors?.length || 0) + ' erro(s) restantes';
                                stepsEl.innerHTML += `<div style="color:#4ade80;margin-top:8px;font-weight:bold">${msg}</div>`;
                                resultArea.innerHTML = `<div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">
                                    <a href="/download/${dl}" class="btn-download" style="text-decoration:none;flex:1;text-align:center;padding:12px;border-radius:8px;background:#16a34a;color:#fff;font-weight:600">⬇️ Baixar Corrigido</a>
                                    <button class="btn-confirm" onclick="doConfirm('/download/${dl}')" style="flex:1;padding:12px;border-radius:8px;background:#0891b2;color:#fff;font-weight:600;border:none;cursor:pointer">✅ Confirmar & Atualizar MD</button>
                                </div>`;
                            }
                        } else if (step === 'error') {
                            stepsEl.innerHTML += `<div style="color:#f87171;margin-top:8px">${msg}</div>`;
                        }
                    } catch(e) {}
                }
            }
        }
    } catch (e) {
        resultArea.innerHTML = `<div style="color:#f87171;margin-top:12px">❌ Erro: ${escHtml(e.message)}</div>`;
    }
}

function showLoading(text) {
    document.getElementById('loading').classList.add('active');
    document.getElementById('result').classList.remove('active');
    document.getElementById('loading-text').textContent = text;
}

function hideLoading() {
    document.getElementById('loading').classList.remove('active');
}

function showResult(type, data) {
    hideLoading();
    const el = document.getElementById('result');
    el.classList.add('active');
    el.innerHTML = renderResult(type, data);
}

function renderResult(type, data) {
    if (type === 'success') {
        const tipos = Object.entries(data.record_types||{}).map(([t,c]) => `${t}=${c}`).join(' · ');
        return `<div class="result-success">
            <div style="font-size:48px;margin-bottom:12px">✅</div>
            <h3 style="color:#4ade80;margin-bottom:4px">Arquivo Válido!</h3>
            <p style="color:#888;font-size:13px;margin-bottom:16px">Nenhum erro encontrado</p>
            <div class="info-bar">${data.total_lines} linhas · ${data.has_crlf?'CR+LF ✅':'⚠️ sem CR+LF'} · ${tipos}</div>
        </div>`;
    }

    if (type === 'error') {
        return `<div class="result-error">
            <h3>❌ Erro</h3>
            <p style="color:#fca5a5;font-size:13px">${escHtml(String(data))}</p>
        </div>`;
    }

    if (type === 'errors') {
        const erros = (data.errors||[]).map(e =>
            `<div class="error-item">
                <span class="badge badge-line">L${e.linha}</span>
                <span class="badge badge-code">${e.codigo}</span>
                <span>${escHtml(e.msg)}</span>
            </div>`
        ).join('');

        const tipos = Object.entries(data.record_types||{}).map(([t,c]) => `${t}=${c}`).join(' · ');

        return `<div class="result-error">
            <h3>❌ ${data.errors.length} Erro(s) Encontrado(s)</h3>
            <p style="color:#888;font-size:12px;margin-bottom:12px">${data.filename||''} · ${data.total_lines} linhas · ${data.has_crlf?'CR+LF ✅':'⚠️ sem CR+LF'}</p>
            ${erros}
            <div class="info-bar">${tipos}</div>
            <div class="fix-hint">🤖 Clique em <strong>"Corrigir com IA"</strong> para corrigir automaticamente via DeepSeek</div>
        </div>`;
    }

    if (type === 'fixed') {
        const downUrl = data.download_name ? '/download/' + data.download_name : '#';
        const recheck = data.re_valid ? '✅ revalidado sem erros' :
            (data.remaining_errors||[]).length + ' erro(s) restantes';

        return `<div class="result-success">
            <div style="font-size:48px;margin-bottom:12px">🎉</div>
            <h3 style="color:#4ade80;margin-bottom:4px">Arquivo Corrigido!</h3>
            <p style="color:#888;font-size:13px;margin-bottom:16px">Revalidação: ${recheck}</p>
            <div class="btn-row">
                <a href="${downUrl}" class="btn-download" style="text-decoration:none">⬇️ Baixar Corrigido</a>
                <button class="btn-confirm" onclick="doConfirm('${downUrl}')">✅ Confirmar & Atualizar MD</button>
            </div>
            ${(data.remaining_errors||[]).length ? '<p style="color:#fbbf24;font-size:12px;margin-top:12px">⚠️ Ainda há erros residuais. Baixe o arquivo e reenvie para corrigir novamente.</p>' : ''}
        </div>`;
    }

    return '';
}

async function doConfirm(dlUrl) {
    if (!validationData?.errors?.length) return;

    try {
        const r = await fetch('/confirm-fix', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                errors: validationData.errors,
                description: 'Correção confirmada via web app',
                filename: currentFileName || 'arquivo.TXT',
            })
        });
        const d = await r.json();
        if (d.success) {
            const el = document.getElementById('result');
            const banner = document.createElement('div');
            banner.className = 'confirm-banner';
            banner.textContent = '✅ Documentação atualizada! Correções futuras serão mais precisas.';
            el.appendChild(banner);
            if (dlUrl && dlUrl !== '#') window.open(dlUrl, '_blank');
        }
    } catch(e) {}
}

function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}
</script>

</body>
</html>
